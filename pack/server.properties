#Minecraft server properties - synced from pack/server.properties by
#scripts/build_server.py. Edit the source file, not server/server.properties
#directly (regenerated, gitignored).
#`motd` below contains the literal token {VPP_VERSION} - build_server.py
#substitutes it with pack/VERSION's contents at sync time, so the MOTD
#always names the running server's actual version (visible in the
#multiplayer server list even to a client NeoForge's handshake rejects
#outright before any in-game/KubeJS mechanism could reach it - see
#pack/kubejs/server_scripts/version_check.js's COVERAGE note). Do not
#hardcode a version number here.
accepts-transfers=false
allow-flight=true
allow-nether=true
broadcast-console-to-ops=true
broadcast-rcon-to-ops=true
bug-report-link=
difficulty=normal
enable-command-block=false
enable-jmx-monitoring=false
enable-query=false
enable-rcon=false
enable-status=true
enforce-secure-profile=true
enforce-whitelist=false
entity-broadcast-range-percentage=100
force-gamemode=false
function-permission-level=2
gamemode=survival
generate-structures=true
generator-settings={}
hardcore=false
hide-online-players=false
initial-disabled-packs=
initial-enabled-packs=vanilla
level-name=world
level-seed=
level-type=minecraft\:normal
log-ips=true
max-chained-neighbor-updates=1000000
max-players=20
max-tick-time=-1
max-world-size=29999984
motd=Vanilla++ v{VPP_VERSION} - a Create-centric RPG modpack (client must match)
network-compression-threshold=256
online-mode=true
op-permission-level=4
player-idle-timeout=0
prevent-proxy-connections=false
pvp=true
query.port=25565
rate-limit=0
rcon.password=
rcon.port=25575
region-file-compression=deflate
require-resource-pack=false
resource-pack=
resource-pack-id=
resource-pack-prompt=
resource-pack-sha1=
server-ip=
server-port=25565
simulation-distance=8
spawn-animals=true
spawn-monsters=true
spawn-npcs=true
spawn-protection=16
sync-chunk-writes=false
text-filtering-config=
use-native-transport=true
view-distance=8
white-list=false
