# ============================================================================
# Vanilla++ Tier 9 — Jovian Frontier
# Fourth and final space tier (Phase 8, for now - Stellaris' own future
# updates could extend this further). Triggered by reaching either Venus or
# Mercury (unlocked by Tier 8 - see triggers.toml, both grant this stage
# since either inner planet counts as "cleared the inner system"). Unlocks
# Jupiter, the current end of Stellaris' explorable solar system.
# ============================================================================

[stage]
id = "jovian_frontier"
display_name = "Jovian Frontier"
description = "The inner system is conquered. Jupiter is the final frontier."
icon = "minecraft:end_crystal"
unlock_message = "&d&lJovian Frontier Unlocked! &r&7Jupiter, the giant, awaits."
dependency = "inner_system"

[items]
# Gear overhaul (post-Phase-9): the ultimate Silent Gear material tier -
# Allthemodium's own "Alloy" combining Unobtainium + Vibranium.
locked = [
    "id:allthemodium:unobtainium_vibranium_alloy_ingot",

    # Utility overhaul Part 6: Stack Upgrade Omega Tier (multiplies stacks
    # per slot by 33,554,431) is Sophisticated Backpacks' own top-tier
    # item, crafted from 9x Stack Upgrade Tier 4 with no raw-material
    # ingredient to naturally gate it - reserved as the final tier's
    # capstone reward for the "Miner's Pouch" bulk-storage line.
    "id:sophisticatedbackpacks:stack_upgrade_omega_tier",

    # TODO.md item 2: TFMG "Combustion Age" milestone - the mod's own
    # engine parts, the final rung of the 5-tier TFMG automation ladder
    # started at Starforged Age. See DESIGN.md's endgame automation
    # section.
    "id:tfmg:engine_cylinder",
    "id:tfmg:diesel_engine_cylinder",
]
always_unlocked = []

[blocks]
locked = [
    "id:tfmg:engine_controller",
    "id:tfmg:engine_gearbox",

    # TODO.md item 2: the three "infinite" capstones - the true final-tier
    # reward, each requiring a deep TFMG+Create+this-tier's-own-alloy
    # crafting chain (new recipes added this pass: pack/kubejs/data/
    # refinedstorage/recipe/creative_storage_block.json + .../
    # creative_fluid_storage_block.json, pack/kubejs/data/create/recipe/
    # creative_motor.json + creative_crate.json). All four are Refined
    # Storage's/Create's own pre-existing, fully-functional "creative
    # mode" blocks (genuinely infinite capacity/generation/replication,
    # not a custom reimplementation) that ship with zero survival recipe
    # by default - this pass adds the recipe and gates it here, rather
    # than building new infinite-behavior blocks from scratch. See
    # DESIGN.md for the full rationale and the disclosed exploit-risk
    # caveat on the Creative Crate.
    "id:refinedstorage:creative_storage_block",
    "id:refinedstorage:creative_fluid_storage_block",
    "id:create:creative_motor",
    "id:create:creative_crate",
]
always_unlocked = []

[dimensions]
locked = [
    "id:stellaris:jupiter",
]
