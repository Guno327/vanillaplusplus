# ============================================================================
# Vanilla++ Tier 3 — Precision Age
# Create's own top-tier materials: Refined Radiance, Shadow Steel, and the
# Sturdy Sheet built from them. No external addon needed for this rung — it's
# entirely Create's native material chain, which is the point ("engaging with
# Create should be the sole process by which you automate things").
# Vanilla netherite tier and the End are held back until here.
#
# Storage: capacity scales to 16k, plus wireless/network-management devices
# (Wireless Grid, Network Receiver/Transmitter, Relay, Portable Grid,
# Security Manager). Still no native autocrafting — that's Induction Age.
# ============================================================================

[stage]
id = "precision_age"
display_name = "Precision Age"
description = "Refined Radiance, Shadow Steel, Sturdy Sheets. Create's own endgame alloys."
icon = "create:sturdy_sheet"
unlock_message = "&d&lPrecision Age Unlocked! &r&7Netherite gear and the End await."
dependency = "brass_age"

[items]
locked = [
    "id:create:refined_radiance",
    "id:create:shadow_steel",
    "id:create:sturdy_sheet",

    "id:minecraft:ancient_debris",
    "id:minecraft:netherite_scrap",
    "id:minecraft:netherite_ingot",
    "id:minecraft:netherite_block",
    "id:minecraft:netherite_pickaxe",
    "id:minecraft:netherite_sword",
    "id:minecraft:netherite_axe",
    "id:minecraft:netherite_shovel",
    "id:minecraft:netherite_hoe",
    "id:minecraft:netherite_helmet",
    "id:minecraft:netherite_chestplate",
    "id:minecraft:netherite_leggings",
    "id:minecraft:netherite_boots",
    "id:minecraft:elytra",
    "id:minecraft:totem_of_undying",

    # Phase 7: Epic Fight's netherite-tier weapons, locked alongside vanilla
    # netherite gear above.
    "id:epicfight:netherite_dagger",
    "id:epicfight:netherite_greatsword",
    "id:epicfight:netherite_longsword",
    "id:epicfight:netherite_spear",
    "id:epicfight:netherite_tachi",

    "id:refinedstorage:16k_storage_part",
    "id:refinedstorage:16k_storage_disk",
    "id:refinedstorage:1024b_fluid_storage_part",
    "id:refinedstorage:1024b_fluid_storage_disk",
    "id:refinedstorage:wireless_grid",
    "id:refinedstorage:portable_grid",
    "id:refinedstorage:network_card",
    "id:refinedstorage:security_card",
    "id:refinedstorage:fallback_security_card",

    "id:toms_storage:adv_wireless_terminal",

    # Gear overhaul Part 4: Arcanist's Robes (mid defense/mid Thread slots) -
    # see andesite_age.toml's sorcerer_robes comment for why the robe item
    # itself is what's tier-locked (its reagent is any Silent Gear chestplate).
    "id:ars_nouveau:arcanist_robes",

    # Utility overhaul Part 5: Building Wands. Netherite wand is already
    # naturally gated by its netherite_ingot ingredient (locked above);
    # explicit lock added anyway for consistency with this file's own
    # convention. This is also Building Wands' native ceiling - WandTier
    # is a closed Java enum with no material registry, so no further tiers
    # exist past netherite (same disclosed situation as Epic Fight's
    # original ceiling before the combat overhaul's Part 3 bespoke
    # extension - not worth replicating that effort for a secondary
    # utility item).
    "id:wands:netherite_wand",
    "id:wands:magic_bag_3",

    # Utility overhaul Part 6: Sophisticated Backpacks. Netherite backpack
    # and Stack Upgrade Tier 4 are the mod's own native ceiling (same
    # closed-tier-ladder situation as Building Wands - both already
    # naturally gated by their netherite_ingot ingredient, locked above,
    # explicit lock added for consistency). Advanced Void Upgrade
    # (diamond+gold+redstone) completes the "Miner's Pouch" line here too.
    "id:sophisticatedbackpacks:netherite_backpack",
    "id:sophisticatedbackpacks:stack_upgrade_tier_4",
    "id:sophisticatedbackpacks:advanced_void_upgrade",

    # Travel overhaul Part 2 (revised): Create Aeronautics' mid tier - again
    # no explicit lock needed. aeronautics:gyroscopic_propeller_bearing and
    # aeronautics:smart_propeller are patched via KubeJS (travel.js) to
    # require create:sturdy_sheet (locked above), and
    # aeronautics:levitite_blend already needs crushed minecraft:end_stone
    # in its native recipe - the only practical source is the End itself,
    # which this pack already locks until this tier. Together: steerable
    # gyroscopic flight plus levitite lift both open at Precision Age
    # purely through resource availability.

    # TODO.md item 1: Create Ore Excavation's netherite-tier drill.
    # netherite_drill_smithing.json already needs minecraft:netherite_ingot
    # (locked above) as its smithing addition; explicit lock added anyway
    # for consistency with this file's own convention (see Wands/
    # Sophisticated Backpacks comments above). This is also the mod's own
    # native tool ceiling (Iron -> Diamond -> Netherite, a fixed 3-rung
    # ladder) - no further hand-tool tier exists past this.
    "id:createoreexcavation:netherite_drill",

    # TODO.md item 4: personal-mobility progression, rung 3 - Create Stuff
    # 'N Additions' brass jetpack (steam-fired, this pack's steam/Brass Age
    # material tier). Also this jetpack line's smithing base: create_sa's
    # own netherite jetpack upgrades FROM this item (see induction_age.toml
    # for the full smithing-upgrade note). Chest-slot contention with
    # Elytra, already locked at this same tier, is an accepted tradeoff per
    # the orchestrator - Elytra and jetpacks are both "chestplate flight
    # items" and a player is expected to pick one per outfit, same as any
    # other armor-slot choice.
    "id:create_sa:brass_jetpack_chestplate",

    # TODO.md item 9 (food overhaul): Farmer's Delight's netherite_knife
    # (netherite_knife_smithing.json: diamond_knife + netherite_ingot smithing
    # upgrade - netherite_ingot is already locked above in this same file) -
    # already naturally gated, explicit lock added anyway for consistency
    # with this file's own convention (see e.g. createoreexcavation:
    # netherite_drill above).
    "id:farmersdelight:netherite_knife",

    # TODO.md item 9 (food overhaul): End's Delight's 4 knife tool items
    # (dragon_egg_shell_knife, dragon_tooth_knife, end_stone_knife,
    # purpur_knife - all confirmed real items via the jar's own lang file).
    # This pack has no existing precedent for gating an "End-derived tool"
    # specifically (the one candidate, waystones:end_stone_waystone, is
    # locked at Induction Age only as part of a same-tier batch of ALL
    # waystone variants regardless of material - not a real precedent), so
    # this reuses this same file's own `[dimensions] locked =
    # ["id:minecraft:the_end"]` combined with this file's repeatedly-
    # demonstrated habit of explicit-locking items that are already
    # naturally gated by a locked material/dimension (netherite_wand,
    # diamond_drill, createoreexcavation:drilling_machine, etc. above).
    # Judgment call, orchestrator-endorsed at integration time.
    "id:ends_delight:dragon_egg_shell_knife",
    "id:ends_delight:dragon_tooth_knife",
    "id:ends_delight:end_stone_knife",
    "id:ends_delight:purpur_knife",

    # TODO.md item 9 (food overhaul): ExtraDelight's netherite_spoon
    # (netherite_spoon_smithing.json: diamond_spoon + netherite_ingot
    # smithing upgrade, mirroring farmersdelight:netherite_knife above) -
    # already naturally gated by its netherite_ingot ingredient (locked
    # above in this file); explicit lock added for consistency. This is the
    # real, verified material-tier precedent for netherite tools in this
    # pack (every existing netherite-tier item lives in THIS file, not
    # induction_age.toml) - see brass_age.toml's spoon comment for the full
    # iron/gold/diamond/netherite mapping and the deviation this represents
    # from the item9 handoff dir's drafted "netherite->Induction" guess.
    "id:extradelight:netherite_spoon",

    # #70: Sophisticated Storage. Netherite tier-upgrade items and Stack
    # Upgrade Tiers 4/5/Omega are this mod's own native ceiling (same closed-
    # tier-ladder situation as sophisticatedbackpacks:netherite_backpack
    # above) - already naturally gated by their netherite_ingot ingredient
    # (locked above in this file), explicit lock added for consistency with
    # this file's own convention.
    "id:sophisticatedstorage:basic_to_netherite_tier_upgrade",
    "id:sophisticatedstorage:diamond_to_netherite_tier_upgrade",
    "id:sophisticatedstorage:stack_upgrade_tier_4",
    "id:sophisticatedstorage:stack_upgrade_tier_5",
    "id:sophisticatedstorage:stack_upgrade_omega_tier",
]
always_unlocked = []

[blocks]
locked = [
    "id:minecraft:netherite_block",

    "id:refinedstorage:network_receiver",
    "id:refinedstorage:network_transmitter",
    "id:refinedstorage:wireless_transmitter",
    "id:refinedstorage:relay",
    "id:refinedstorage:security_manager",
    "id:refinedstorage:16k_storage_block",
    "id:refinedstorage:1024b_fluid_storage_block",

    # TODO.md item 1: Create Ore Excavation's industrial-scale vein
    # machines (Drilling Machine, Sample Drill, Fluid Well Extractor).
    # All three share create:sturdy_sheet in their create:mechanical_crafting
    # recipe (this tier's own Create milestone material) - already naturally
