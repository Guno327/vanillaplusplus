    # This is also where the allthemodium/vibranium/unobtainium vein types
    # added this pass become actually extractable, since their drilling
    # recipes require createoreexcavation:netherite_drill (locked above,
    # itself gated to this same tier) - the vein-hunting kit unlocked
    # across andesite_age/brass_age/precision_age reaches its ceiling here.
    "id:createoreexcavation:drilling_machine",
    "id:createoreexcavation:sample_drill",
    "id:createoreexcavation:extractor",

    # #70: Sophisticated Storage. Netherite barrel/chest/shulker - the mod's
    # own native tier ceiling, already naturally gated by netherite_ingot
    # (locked above in this file); explicit lock added for consistency with
    # this file's own convention (see e.g. sophisticatedbackpacks:
    # netherite_backpack precedent in [items] above).
    "id:sophisticatedstorage:netherite_barrel",
    "id:sophisticatedstorage:netherite_chest",
    "id:sophisticatedstorage:netherite_shulker_box",
]
always_unlocked = []

[dimensions]
locked = [
    "id:minecraft:the_end",
]

[recipes]
locked_ids = []
locked_items = []

[enforcement]
block_crafting_with_locked_ingredients = true
block_automated_crafting = true
crafter_check_radius = 32
