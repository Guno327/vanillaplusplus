# ============================================================================
# Vanilla++ Tier 5 — Starforged Age
# The space-travel gateway tier, finalized in Phase 8: per instructions.md's
# resolved decision, Starforged Age is the explicit "you've beaten the
# overworld/Nether/End, now build a rocket" tier, not a single catch-all
# endgame tier. Its trigger (Ender Dragon kill, see triggers.toml) matches
# that directly - you can't start building a rocket until the End is done.
# Each planet beyond it is its own additional tier layered on top (Tier 6:
# lunar_frontier, Tier 7: martian_frontier, Tier 8: inner_system, Tier 9:
# jovian_frontier - see those files), gated behind the previous one the same
# way Tiers 0-5 gate each other.
# ============================================================================

[stage]
id = "starforged_age"
display_name = "Starforged Age"
description = "The overworld, Nether, and End are conquered. Space travel begins."
icon = "minecraft:nether_star"
unlock_message = "&5&lStarforged Age Unlocked! &r&7Build a rocket - the stars await."
dependency = "induction_age"

[items]
locked = [
    "id:stellaris:rocket",
    "id:stellaris:rocket_engine",
    "id:stellaris:rocket_fin",
    "id:stellaris:rocket_nose_cone",

    # Gear overhaul (post-Phase-9): Starforged Age's own Silent Gear material
    # tier - see induction_age.toml's comment for why locking just the raw
    # ingot is sufficient (block_crafting_with_locked_ingredients).
    "id:allthemodium:vibranium_ingot",

    # Gear overhaul Part 4: Battlemage's Gambeson (highest defense, fewest
    # Thread slots of the 3 robes) - see andesite_age.toml's sorcerer_robes
    # comment for why the robe item itself is what's tier-locked.
    "id:ars_nouveau:battlemage_robes",

    # TODO.md item 2: TFMG "Aluminum Age" milestone - the first of five
    # named automation milestones paired with Tiers 5-9 (mirroring how
    # Tiers 0-4 each pair a Create milestone with their stage). TFMG was
    # installed since Phase 8 purely as a Stellaris compat dependency and
    # had never actually been used for anything until this pass - see
    # DESIGN.md's endgame automation section for the full curated list
    # (a representative subset of TFMG's ~800-entry registry, not an
    # exhaustive audit, same "spot-checked, disclosed" precedent as
    # Phase 9's recipe-gating audit).
    "id:tfmg:aluminum_ingot",
]
always_unlocked = []

[blocks]
locked = [
    "id:stellaris:rocket_launch_pad",
    "id:stellaris:rocket_station",

    "id:tfmg:bauxite",
    "id:tfmg:aluminum_frame",
    "id:tfmg:air_intake",
]
always_unlocked = []

[dimensions]
locked = []
