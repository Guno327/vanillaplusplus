# ============================================================================
# Vanilla++ Tier 8 — Inner System
# Third space tier (Phase 8). Triggered by reaching Mars (unlocked by
# Tier 7). Unlocks Venus and Mercury together - both are extreme,
# hostile-environment planets of comparable difficulty (unlike Moon/Mars/
# Jupiter, there's no clear natural ordering between them), so they're
# grouped as one tier rather than an arbitrary pick of which comes "first."
# ============================================================================

[stage]
id = "inner_system"
display_name = "Inner System"
description = "Mars is conquered. Venus and Mercury are next."
icon = "minecraft:magma_block"
unlock_message = "&6&lInner System Unlocked! &r&7Venus and Mercury await."
dependency = "martian_frontier"

[items]
locked = []
always_unlocked = []

[blocks]
# TODO.md item 2: TFMG "Electrical Age" milestone - the mod's own power
# grid (a distinct energy type from Create's kinetic power/FE, bridged by
# its own Converter block), see DESIGN.md's endgame automation section.
locked = [
    "id:tfmg:electric_motor",
    "id:tfmg:accumulator",
    "id:tfmg:converter",
    "id:tfmg:copper_cable_hub",
]
always_unlocked = []

[dimensions]
locked = [
    "id:stellaris:venus",
    "id:stellaris:venus_orbit",
    "id:stellaris:mercury",
    "id:stellaris:mercury_orbit",
]
