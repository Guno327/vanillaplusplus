# ============================================================================
# Vanilla++ Tier 2 — Brass Age
# Create's mid-game alloy: Mechanical Arms, Deployers, Sequenced Gearshifts,
# Elevator Pulleys, portable interfaces, train control. This is where real
# automation starts, so it doubles as our "diamond-equivalent" gate — vanilla
# diamond tools/armor and the enchanting table/beacon are held back until here
# too, alongside the Nether (every Refined Storage component needs Nether
# Quartz, and RS itself is a Brass Age unlock — see below).
#
# Storage: this is where players graduate from Tier 1's "dumb storage" (Tom's
# Storage) to a real powered network. Refined Storage unlocks here in full —
# Grid/Disk Drive/Controller/1k storage plus the Brass Age additions
# (Importer/Exporter/etc, 4k storage) — using its STOCK recipes: Disk Drive
# needs a diamond-tier Advanced Processor, which is fine now since diamond
# unlocks this same tier, so no KubeJS patch is needed here (unlike Tom's
# Storage at Andesite Age). RS's Controller requires energy (requireEnergy
# stays on in refinedstorage-common.toml), supplied by Create Crafts &
# Additions' Alternator — a Create-native kinetic-to-FE generator, also
# unlocked this tier. This keeps "engaging with Create should be the sole
# process by which you automate things" true even for storage power: no
# separate FE-only power mod, just Create rotation feeding an Alternator.
# ============================================================================

