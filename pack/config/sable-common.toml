#Whether sub-levels can split when parts are separated
sub_level_splitting = true
#Sub-level splitting heatmap steps that take place per tick
# Default: 200
# Range: > 1
sub_level_splitting_heatmap_steps = 200
#The distance to network sub-levels to players at
# Default: 320.0
# Range: 1.0 ~ 1.7976931348623157E308
sub_level_tracking_range = 320.0
#Keeps sub-levels with intersecting players from unloading at all
sub_levels_with_players_cannot_unload = true
#The minimum y coordinate sub-levels can exist at
# Default: -10000.0
# Range: -Infinity ~ Infinity
sub_level_remove_min = -10000.0
#The maximum y coordinate sub-levels can exist at
# Default: 100000.0
# Range: -Infinity ~ Infinity
sub_level_remove_max = 100000.0
#The fraction of velocity that is retained when a sub-level is loaded in. A value of 0.0 will indicate that no velocity should be carried over, while a value of 1.0 would carry over 100% of velocity on load.
# Default: 0.9
# Range: 0.0 ~ 1.0
sub_level_velocity_retained_on_load = 0.9
#The strength multiplier applied to sub-level punching impulses
# Default: 2.1
# Range: 0.0 ~ Infinity
sub_level_punch_strength_multiplier = 2.1
#The strength multiplier applied to the vertical component of downward sub-level punching impulses (to prevent jumping by punching the ground while standing on something light)
# Default: 0.175
# Range: 0.0 ~ Infinity
sub_level_punch_downward_strength_multiplier = 0.175
#The cooldown in ticks between sub-level punches
# Default: 3
# Range: > 0
sub_level_punch_cooldown_ticks = 3
#If the entire Sable UDP Networking pipeline should be disabled. This can improve compatibility with certain mods like Replay mod and certain networking setups, but will have worse performance and latency for networking sub-levels.
#GitHub issue #49: flipped from the mod's shipped default (false) to true - the
#stock default drove the "hangs at Loading Terrain" bug (both dedicated-server
#and singleplayer, same symptom). Server log evidence: the UDP auth handshake
#succeeds on join, then dies ~29s later ("failed to respond to any keep-alive
#packets after ~25000ms, kicking them to TCP"), and the client never recovers
#from that mid-session fallback. javap-ground-truthed against the installed
#sable-neoforge-2.0.3 jar: ServerConnectionListenerMixin's UDP-listener setup
#(sable$startTcpServerListener) checks this exact flag first and returns
#immediately if it's true, skipping the whole per-player UDP pipeline before
#it ever starts - sub-level data then rides the ordinary TCP connection
#instead, at the mod's own documented performance/latency cost, everything
#else below is the real shipped default.
disable_udp_pipeline = true
#If Sable should attempt to authenticate with clients and send them sub-level movement data over UDP
#client-test-harness hardening (2026-07-23): flipped from the mod's shipped default
#(true) to false - disable_udp_pipeline above does NOT actually cover this. javap-
#ground-truthed against the installed sable-neoforge-2.0.3 jar: disable_udp_pipeline
#only gates ServerConnectionListenerMixin's per-player UDP LISTENER setup (server
#never binds a UDP socket), but SableUDPServer's activation-packet send (the code
#that tells a joining client "go ahead and authenticate over UDP", via
#ClientboundSableUDPActivationPacket) is gated ONLY by this attempt_udp_networking
#flag, independently of disable_udp_pipeline - so with the old true/true
#combination the server was still telling every client to authenticate over UDP
#against a listener that was never started. The client's own ConnectionMixin
#unconditionally opens an outbound UDP channel on every connect (no config check
#at all in that code path - "Starting remote client UDP channel future" in the
#client log), then acts on the server's activation packet and waits for an
#auth response that can never arrive; L3's real client-join tier caught the
#result directly: every client disconnected ~30-33s post-join with
#"io.netty.channel.unix.Errors$NativeIoException: recvAddress(..) failed:
#Connection reset by peer" - the exact ~29s window #49's original report
#described, now root-caused precisely rather than just reproduced. Setting this
#to false stops the server from ever sending that activation packet, so the
#client's already-open (and otherwise harmless/inert) UDP channel is never asked
#to do anything and the main connection survives. See pack/config/sable-
#client.toml for the matching client-side belt-and-suspenders setting (added
#in Sable 2.0.0 specifically for this purpose, per the mod's own changelog).
attempt_udp_networking = false
#If Sable should log when saving sub-levels for a dimension.
sub_level_saving_log_message = true
#If Sable should use verbose logging for its serialization system and the holding chunk-map. Not recommended- for debugging purposes only.
verbose_serialization_logging = false
