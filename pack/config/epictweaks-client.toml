
#Forces vanilla rendering in first person view while not
#holding a 'combat preferred' item (for non-combat motions).
#Default: true
#
#client-test-harness hardening (2026-07-23): flipped to false alongside
#autoswitch_mode below - same NoSuchFieldError crash (see autoswitch_mode's own
#comment for the full mechanism), a THIRD independent site. javap decompilation
#of RenderEngineMixin#inject__epicfight$renderHand (woven into Epic Fight's
#RenderEngine.renderHand, a NeoForge RenderHandEvent listener that fires on
#every rendered frame, not gated by any tick/mode-switch trigger) shows it
#checks getFilterAnimationFirstPerson() (this flag) - together with
#isEpicFightMode(), also true-gated - before reaching the same missing
#ClientConfig.combatPreferredItems field. grep of the installed jar confirms
#exactly three classes reference that field at all (LocalPlayerPatchMixin,
#PlayerPatchMixin, RenderEngineMixin); the other two are already closed by
#autoswitch_mode=false and enforce_mode=false (the latter pre-existing, #84) -
#this is the last one. With all three flags false, epic-tweaks' mode-switching
#feature set is effectively a no-op (the player can still toggle Epic Fight/
#Vanilla Mode manually via its own keybind), which is the correct tradeoff
#until epic-tweaks ships a build compatible with a post-2025-09 Epic Fight
#(Modrinth has no newer 1.21.1/neoforge build as of this pack's current pin).
filter_animation_first_person = false
#If enabled the player cannot manually switch to vanilla mode while holding a
#'combat preferred' item or to combat mode while not holding a 'combat preferred' item.
#This option has no effect if the 'canSwitchPlayerMode' gamerule is disabled.
#Default: true
#
#GitHub issue #84 (regression from PR #89): flipped to false. Ground-truthed via
#CFR decompile of the installed epic-fight-21.17.3.1 + epic-tweaks jars: giving
#Silent Gear weapons an Epic Fight weapon capability (#89) auto-registers them
#into EpicFight's own ClientConfig.combatCategorizedItems set (config key
#ingame.combat_preferred_items - populated once at first client boot by
#ItemsPreferenceScreen.resetItems(), which sweeps every item whose EF item-stack
#capability is instanceof WeaponCapability). With enforce_mode=true, epic-tweaks'
#PlayerPatchMixin#onToggleMode cancels the player's own "Switch Mode" keypress
#while holding any such item, so once autoswitch_mode (left true below) auto-
#enters Epic Fight Mode on equip, the player is locked into it for as long as
#they hold the weapon. Epic Fight's own ControlEngine.handleEpicFightKeyMappings
#(runs every client tick, only while PlayerPatch.PlayerMode == EPICFIGHT) cancels
#the vanilla Q-drop keybind (MixinLocalPlayer#epicfight$onDrop) and all 9 hotbar-
#slot keybinds (ControlEngine#disableHotbarSlotPresses) whenever
#ControlEngine#isSwitchOrDropBlocked() is true - true during any active attack/
#dodge/guard animation (EntityState#canSwitchHoldingItem(), self-clearing) OR for
#~1s after the last combat input (the hotbarLocked flag, also self-clearing) -
#with no way out while mode-locked in. There is no toggle anywhere in Epic
#Fight's own ClientConfig/CommonConfig/ServerConfig to disable this drop/hotbar
#cancellation directly (confirmed via full bytecode string dump of all three
#config classes - CanceledVanillaActions only gates right-click interact/
#item-use cancellation, unrelated). Flipping enforce_mode to false restores the
#player's own "Switch Mode" keybind as an escape hatch: tap it to drop back to
#Vanilla Mode on demand (Q/number-keys work again immediately) and tap it again
#to re-enter combat mode for the moveset mapping from #89. autoswitch_mode is
#left true so combat mode (and #89's moveset mapping) still engages automatically
#the instant the weapon is equipped/attacked with - only the "can never leave
#while holding it" lock is relaxed. The transient ~1s lock during an actual
#attack/dodge/guard swing is untouched by this - that part is Epic Fight's own
#hardcoded combat-timing mechanic (not configurable) and applies identically to
#every Epic Fight weapon, vanilla or Silent Gear. Verify-in-game.
enforce_mode = false
#If enabled the player will automatically switch to epic fight mode when switching to
#a 'combat preferred' item and back to vanilla mode when switching to any other item.
#This option has no effect if the 'canSwitchPlayerMode' gamerule is disabled.
#Default: true
#
#client-test-harness hardening (2026-07-23): flipped to false - this is a HARD
#CRASH, not a QoL tradeoff. javap decompilation of the installed epic-tweaks
#1.2.0 jar's LocalPlayerPatchMixin#updateHeldItem (woven into Epic Fight's own
#LocalPlayerPatch, runs on every entity tick via
#VanillaEntityEventHooks.preTick) shows it reads
#getAutoSwitchMode() first and returns immediately if false (bytecode offset
#0-6: ifeq -> return) - but when true, the very next thing it does is
#`getstatic yesman/epicfight/config/ClientConfig.combatPreferredItems` - a
#field that does NOT EXIST on the currently-pinned epic-fight-21.17.3.1's
#ClientConfig (confirmed via javap field listing: it has been renamed/
#restructured to COMBAT_CATEGORIZED_ITEMS at some point between epic-tweaks
#1.2.0's release, 2025-09-09, and Epic Fight's current pin, 2026-05-31 - epic-
#tweaks has had no update since to follow that rename, and Modrinth lists no
#newer neoforge-1.21.1 build to bump to). The result is a
#java.lang.NoSuchFieldError thrown on EVERY entity tick that reaches this
#method (any tick with a local player present) - L3's real client-join tier
#caught this directly: it manifested as the client crashing outright roughly
#30s after every join (a net.minecraft.ReportedException "Ticking entity"),
#which LOOKED identical to the historical #49 Sable ~29s symptom in server-
#side logs (the abrupt TCP "Connection reset by peer" as the JVM died) but is
#a completely unrelated bug, ground-truthed by finding the exact same
#NoSuchFieldError already present in every prior L3 client-log capture this
#session, including ones taken before any Sable config was touched. Setting
#autoswitch_mode=false skips the crashing branch entirely (confirmed the only
#call site reading combatPreferredItems is behind this exact check) at the
#cost of the auto-switch-on-equip convenience #89 relied on - the player can
#still enter/exit Epic Fight Mode manually via the "Switch Mode" keybind
#(enforce_mode is already false per #84, so nothing blocks that toggle).
autoswitch_mode = false
