# ============================================================================
# Vanilla++ Tier 6 — Lunar Frontier
# First space tier (Phase 8). Per instructions.md's resolved decision, each
# planet beyond Starforged Age is its own tier layered on top, gated behind
# the previous one the same way Tiers 0-5 gate each other. Triggered by
# reaching Earth orbit (stellaris:earth_orbit, unlocked already at
# Starforged Age - see that file) - i.e. you've successfully launched a
# rocket. Unlocks the Moon itself.
# ============================================================================

[stage]
id = "lunar_frontier"
display_name = "Lunar Frontier"
description = "You've reached orbit. The Moon is next."
icon = "stellaris:rocket"
unlock_message = "&b&lLunar Frontier Unlocked! &r&7The Moon awaits."
dependency = "starforged_age"

[items]
# Gear overhaul (post-Phase-9): Lunar/Martian/Inner System (Tiers 6-8) share
# one Silent Gear material tier (Unobtainium) - locked here at the first of
# the three since block_crafting_with_locked_ingredients then gates it
# transitively for the whole shared span.
locked = [
    "id:allthemodium:unobtainium_ingot",
]
always_unlocked = []

[blocks]
locked = []
always_unlocked = []

[dimensions]
locked = [
    "id:stellaris:moon",
]
