# ============================================================================
# Vanilla++ Tier 2 — Brass Age
# Create's mid-game alloy: Mechanical Arms, Deployers, Sequenced Gearshifts,
# Elevator Pulleys, portable interfaces, train control. This is where real
# automation starts, so it doubles as our "diamond-equivalent" gate — vanilla
# diamond tools/armor and the enchanting table/beacon are held back until here
# too. (The Nether itself unlocks a tier earlier, at Andesite Age — every
# Refined Storage component needs Nether Quartz, so it can't wait this long.)
#
# Storage: this is the first CRAFTING automation tier. Create's own Mechanical
# Arm/Deployer (unlocked this same tier) feed the Refined Storage network via
# Importer/Exporter/External Storage — RS's own pattern-based Autocrafter is
# still locked away until Induction Age (Tier 4). Storage capacity also scales
# up to 4k here.
# ============================================================================

