# ============================================================================
# Vanilla++ — Trigger Configuration
# Automatic stage grants based on player actions. See DESIGN.md for the tier
# table these map to. Tiers 4-5 use temporary vanilla-milestone triggers until
# Phase 2 / Phase 8 pick the mods that actually anchor those tiers.
# ============================================================================

[advancements]
# rootborn is a starting_stage (see progressivestages.toml), no trigger needed.

# GitHub issue #23: this section alone is NOT sufficient to grant these
# stages. ProgressiveStages (server/triggers/ItemPickupStageGrants, javap-
# confirmed) only acts on these mappings from NeoForge's
# ItemEntityPickupEvent$Pre (picking an item up off the ground) plus a
# once-at-login inventory scan - it has no crafting/possession hook, so an
# item crafted straight into inventory (crafting table, Create Basin/Mixer
# extraction, etc.) never grants the mapped stage and downstream FTB Quests
# "gamestage" tasks hard-lock. pack/kubejs/server_scripts/
# progression_stage_bridge.js compensates with a periodic "does the player
# currently hold this item" scan via the player.stages KubeJS bridge - see
# that file's header for the full decompiled root-cause trail. Keep that
# file's PSB_ITEM_STAGE_TRIGGERS mirror in sync with this section (and with
# the [[multi]] any_of item list below) whenever either changes.
[items]
"create:andesite_alloy" = "andesite_age"
"create:brass_ingot" = "brass_age"
"minecraft:netherite_ingot" = "induction_age"   # TODO Phase 2: replace with real automation-tier item

[dimensions]
# Entering a dimension grants the mapped stage (DimensionStageGrants,
# confirmed via decompiling the mod). Each mapping below is deliberately NOT
# circular: the triggering dimension is always one unlocked by an EARLIER
# tier (or, for earth_orbit, not locked at all), and the stage it grants is
# what unlocks the NEXT dimension in the chain - see starforged_age.toml/
# tier6-9 files' [dimensions] locked lists.
"stellaris:earth_orbit" = "lunar_frontier"
"stellaris:moon" = "martian_frontier"
"stellaris:mars" = "inner_system"
"stellaris:venus" = "jovian_frontier"
"stellaris:mercury" = "jovian_frontier"

[bosses]
"minecraft:ender_dragon" = "starforged_age"   # finalized in Phase 8: beating the End is the space-travel gateway

# Same issue #23 gap as [items] above: MultiTriggerManager's item sub-type
# also only fires on ItemEntityPickupEvent$Pre, so this is ALSO mirrored in
# progression_stage_bridge.js's PSB_ITEM_STAGE_TRIGGERS. Keep both in sync.
[[multi]]
id = "precision_age_materials"
stage = "precision_age"
description = "Obtain Refined Radiance or Shadow Steel"
any_of = [
    "item:create:refined_radiance",
    "item:create:shadow_steel",
]
