# ============================================================================
# Vanilla++ Tier 1 — Andesite Age
# Entry point into Create: water wheels, mechanical mixing/pressing, crushing
# wheels (Create's own ore-doubling). Vanilla iron tools/armor are locked here
# on purpose — Phase 7 replaces their recipes with a blacksmithing process
# instead of just unlocking them outright; for now reaching this tier unlocks
# access to them so the world isn't fully frozen while that mod is picked.
#
# A resource listed in THIS file's locked lists becomes available the moment
# the player is granted THIS stage — Brass-tier gear belongs in brass_age.toml
# instead, not here (see that file for why).
#
# Storage: this is the "dumb storage" tier — Tom's Storage (Inventory
# Connector + Storage Terminal + Open Crate + Inventory Cable + Basic
# Inventory Hopper + Filing Cabinet), just linking chests into one browsable
# interface with iron-tier resources. Its stock Inventory Connector/Storage
# Terminal recipes need a diamond+ender_pearl and Nether glowstone
# respectively — patched down via KubeJS (pack/kubejs/server_scripts/
# storage.js) so this tier doesn't secretly require Brass Age or the Nether.
# The "real" powered network (Refined Storage) is a Brass Age unlock — see
# that file and DESIGN.md's storage section.
# ============================================================================

[stage]
id = "andesite_age"
display_name = "Andesite Age"
description = "Water wheels, mechanical mixing, crushing wheels. Iron enters the world."
icon = "create:andesite_alloy"
unlock_message = "&6&lAndesite Age Unlocked! &r&7Create begins. Iron tools and machinery await."
dependency = "rootborn"

[items]
locked = [
    "id:minecraft:iron_ingot",
    "id:minecraft:iron_block",
    "id:minecraft:iron_ore",
    "id:minecraft:deepslate_iron_ore",
    "id:minecraft:raw_iron",
    "id:minecraft:raw_iron_block",
    "id:minecraft:iron_pickaxe",
    "id:minecraft:iron_sword",
    "id:minecraft:iron_axe",
    "id:minecraft:iron_shovel",
    "id:minecraft:iron_hoe",
    "id:minecraft:iron_helmet",
    "id:minecraft:iron_chestplate",
    "id:minecraft:iron_leggings",
    "id:minecraft:iron_boots",
    "id:minecraft:shield",
    "id:minecraft:bucket",
    "id:minecraft:shears",
    "id:minecraft:flint_and_steel",
    "id:minecraft:compass",
    "id:minecraft:clock",
    "id:minecraft:minecart",
    "id:minecraft:rail",
    "id:minecraft:powered_rail",
    "id:minecraft:detector_rail",
    "id:minecraft:activator_rail",

    "id:toms_storage:inventory_configurator",
    "id:toms_storage:item_filter",

    # Phase 7: Epic Fight's iron-tier weapons, locked alongside vanilla iron
    # gear above. Wooden/stone/golden tier stay unlocked from rootborn (their
    # source materials already are); diamond/netherite tier are locked in
    # brass_age.toml/precision_age.toml, matching those materials' own locks.
    "id:epicfight:iron_dagger",
    "id:epicfight:iron_greatsword",
    "id:epicfight:iron_longsword",
    "id:epicfight:iron_spear",
    "id:epicfight:iron_tachi",

    # Phase 7: Ars Nouveau's mage-archetype entry point. Its own recipe
    # already needs gold + Source Gems + an Enchanting Apparatus (which
    # itself needs naturally-generated archwood/sourcestone to find), so
    # this is a light touch on top of gating that largely exists already -
    # just keeping the wand off the table at the very first moment of play.
    "id:ars_nouveau:wand",

    # Gear overhaul Part 4: Sorcerer's Wrap (lowest defense of the 3 Ars
    # Nouveau robe pieces, but the most Thread slots) is now reagent-gated on
    # a Silent Gear chestplate of ANY material (see ars_nouveau_armor.js) -
    # since the robe's own defense value is fixed regardless of which
    # material was used, tier-locking the robe item itself is what actually
    # enforces "as difficult as similarly-strengthed armour". Paired with the
    # lowest tier here to match its lowest-defense role.
    "id:ars_nouveau:sorcerer_robes",

    # Utility overhaul Part 5: Building Wands. Copper/iron wands and Magic
    # Bag Tier 1 - stone_wand stays available from rootborn (trivial
    # cobblestone recipe, matching the tier ladder's own Tier 0 baseline).
    # Iron wand is already naturally gated by its iron_ingot ingredient
    # (locked above); copper_wand isn't naturally gated (copper is never
    # locked in this pack), so it needs an explicit lock here - both are
    # listed explicitly anyway, matching this file's existing convention of
    # locking finished items alongside their raw materials, not relying on
    # ingredient-locking alone.
    "id:wands:copper_wand",
    "id:wands:iron_wand",
    "id:wands:magic_bag_1",

    # Utility overhaul Part 6: Sophisticated Backpacks. Base leather
    # backpack stays available from rootborn (matching stone_wand's own
    # Tier 0 baseline); copper/iron backpacks and the early Stack/Filter
    # Upgrade tiers start here. Iron backpack and Stack Upgrade Tier 1 are
    # already naturally gated by their iron_ingot ingredient (locked
    # above); copper_backpack/stack_upgrade_starter_tier need an explicit
    # lock since copper is never locked anywhere in this pack.
    "id:sophisticatedbackpacks:copper_backpack",
    "id:sophisticatedbackpacks:iron_backpack",
    "id:sophisticatedbackpacks:stack_upgrade_starter_tier",
    "id:sophisticatedbackpacks:stack_upgrade_tier_1",
    "id:sophisticatedbackpacks:filter_upgrade",

    # Travel overhaul Part 1: boats - the first vehicle upgrade past
    # walking. Nothing in vanilla naturally gates boats (planks are always
    # available from Tier 0), so this is a pure explicit lock, not
    # ingredient-transitive like most of this file's other entries.
    "id:minecraft:oak_boat",
    "id:minecraft:spruce_boat",
    "id:minecraft:birch_boat",
    "id:minecraft:jungle_boat",
    "id:minecraft:acacia_boat",
    "id:minecraft:dark_oak_boat",
    "id:minecraft:mangrove_boat",
    "id:minecraft:cherry_boat",
    "id:minecraft:bamboo_raft",
    "id:minecraft:oak_chest_boat",
    "id:minecraft:spruce_chest_boat",
    "id:minecraft:birch_chest_boat",
    "id:minecraft:jungle_chest_boat",
    "id:minecraft:acacia_chest_boat",
    "id:minecraft:dark_oak_chest_boat",
    "id:minecraft:mangrove_chest_boat",
    "id:minecraft:cherry_chest_boat",
    "id:minecraft:bamboo_chest_raft",

    # TODO.md item 1: Create Ore Excavation's entry-level vein-hunting kit
    # (Iron Drill + Ore Vein Finder). Neither is naturally gated by its own
    # ingredients (drill.json needs only iron; vein_finder.json needs
    # amethyst/ender_eye/redstone ore/a wooden rod, all Tier-0-obtainable),
    # so both need an explicit lock here to match this pack's iron-tools
    # convention for this tier.
    "id:createoreexcavation:drill",
    "id:createoreexcavation:vein_finder",

    # TODO.md item 7: Create: Power Loader's andesite-tier chunk loader.
    # Its recipe already needs a respawn anchor (crying obsidian, Nether =
    # Brass Age in this pack), so in practice it's craftable one tier later
    # than this lock - the lock matches the mod's own andesite naming/
    # material tier for consistency, and the recipe self-gating is the
    # stricter of the two. Runs only while spun under real kinetic power
    # (continuous Stress draw), per the recorded running-cost decision.
    "id:create_power_loader:empty_andesite_chunk_loader",
    "id:create_power_loader:andesite_chunk_loader",
]
always_unlocked = []

[blocks]
locked = [
    "id:minecraft:iron_block",
    "id:minecraft:iron_door",
    "id:minecraft:iron_trapdoor",
    "id:minecraft:iron_bars",
    "id:minecraft:hopper",
    "id:minecraft:blast_furnace",
    "id:minecraft:smithing_table",

    "id:toms_storage:inventory_connector",
    "id:toms_storage:storage_terminal",
    "id:toms_storage:open_crate",
    "id:toms_storage:inventory_cable",
    "id:toms_storage:basic_inventory_hopper",
    "id:toms_storage:filing_cabinet",
    "id:toms_storage:level_emitter",
    "id:toms_storage:inventory_proxy",

    "id:ars_nouveau:enchanting_apparatus",
    "id:ars_nouveau:arcane_pedestal",
]
always_unlocked = []

[dimensions]
locked = []

[recipes]
locked_ids = []
locked_items = []

[enforcement]
block_crafting_with_locked_ingredients = true
block_automated_crafting = true
crafter_check_radius = 32
