# ============================================================================
# Vanilla++ Tier 1 — Andesite Age
# Entry point into Create: water wheels, mechanical mixing/pressing, crushing
# wheels (Create's own ore-doubling). Vanilla iron tools/armor are locked here
# on purpose — Phase 7 replaces their recipes with a blacksmithing process
# instead of just unlocking them outright; for now reaching this tier unlocks
# access to them so the world isn't fully frozen while that mod is picked.
#
# A resource listed in THIS file's locked lists becomes available the moment
# the player is granted THIS stage — Brass-tier gear belongs in brass_age.toml
# instead, not here (see that file for why).
#
# Storage: this is where the first tiny, browsable Refined Storage network
# unlocks (Grid + Cable + Disk Drive + 1k Disk/Block, manual only — no
# Importer/Exporter/autocrafting yet). Every RS component needs Nether Quartz,
# which is why the Nether is unlocked HERE rather than at Brass Age — there
# would be no way to get quartz at all otherwise. See DESIGN.md's storage
# section for the full reasoning, including the KubeJS Disk Drive recipe
# patch (its stock recipe needs a diamond, which stays locked until Brass
# Age) in pack/kubejs/server_scripts/storage.js.
# ============================================================================

