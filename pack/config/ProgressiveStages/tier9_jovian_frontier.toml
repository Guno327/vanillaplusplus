# ============================================================================
# Vanilla++ Tier 9 — Jovian Frontier
# Fourth and final space tier (Phase 8, for now - Stellaris' own future
# updates could extend this further). Triggered by reaching either Venus or
# Mercury (unlocked by Tier 8 - see triggers.toml, both grant this stage
# since either inner planet counts as "cleared the inner system"). Unlocks
# Jupiter, the current end of Stellaris' explorable solar system.
# ============================================================================

[stage]
id = "jovian_frontier"
display_name = "Jovian Frontier"
description = "The inner system is conquered. Jupiter is the final frontier."
icon = "minecraft:end_crystal"
unlock_message = "&d&lJovian Frontier Unlocked! &r&7Jupiter, the giant, awaits."
dependency = "inner_system"

[items]
# Gear overhaul (post-Phase-9): the ultimate Silent Gear material tier -
# Allthemodium's own "Alloy" combining Unobtainium + Vibranium.
locked = [
    "id:allthemodium:unobtainium_vibranium_alloy_ingot",

    # Utility overhaul Part 6: Stack Upgrade Omega Tier (multiplies stacks
    # per slot by 33,554,431) is Sophisticated Backpacks' own top-tier
    # item, crafted from 9x Stack Upgrade Tier 4 with no raw-material
    # ingredient to naturally gate it - reserved as the final tier's
    # capstone reward for the "Miner's Pouch" bulk-storage line.
    "id:sophisticatedbackpacks:stack_upgrade_omega_tier",
]
always_unlocked = []

[blocks]
locked = []
always_unlocked = []

[dimensions]
locked = [
    "id:stellaris:jupiter",
]
