# ============================================================================
# Vanilla++ Tier 8 — Inner System
# Third space tier (Phase 8). Triggered by reaching Mars (unlocked by
# Tier 7). Unlocks Venus and Mercury together - both are extreme,
# hostile-environment planets of comparable difficulty (unlike Moon/Mars/
# Jupiter, there's no clear natural ordering between them), so they're
# grouped as one tier rather than an arbitrary pick of which comes "first."
# ============================================================================

