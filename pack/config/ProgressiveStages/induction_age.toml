# ============================================================================
# Vanilla++ Tier 4 — Induction Age
# Create has no native material beyond Precision Age, so this tier isn't
# anchored by a Create alloy the way Tiers 1-3 are. What it DOES represent is
# now concrete: the ceiling of the Refined Storage system introduced back at
# Andesite Age — 64k capacity, Advanced Processors, and native pattern-based
# autocrafting (Autocrafter/Autocrafter Manager/Pattern/Pattern Grid). That
# part is no longer a placeholder.
#
# What IS still a placeholder: the narrative trigger/dimension for this tier.
# There's no Phase-2-relevant mod decision left to make here — this is a
# Phase 8 concern (what the "real" Induction Age milestone should be once
# exploration/dimensions are designed). Trigger below stays a temporary
# vanilla stand-in (netherite ingot pickup, see triggers.toml) until then.
# ============================================================================

[stage]
id = "induction_age"
display_name = "Induction Age"
description = "Full storage-network automation: 64k capacity, native pattern-based autocrafting."
icon = "refinedstorage:advanced_processor"
unlock_message = "&b&lInduction Age Unlocked! &r&7Full autocrafting and 64k storage online."
dependency = "precision_age"

[items]
locked = [
    "id:refinedstorage:advanced_processor",
    "id:refinedstorage:raw_advanced_processor",
    "id:refinedstorage:64k_storage_part",
    "id:refinedstorage:64k_storage_disk",
    "id:refinedstorage:4096b_fluid_storage_part",
    "id:refinedstorage:4096b_fluid_storage_disk",
    "id:refinedstorage:pattern",
    "id:refinedstorage:autocrafting_upgrade",
    "id:refinedstorage:wireless_autocrafting_monitor",

    # Gear overhaul (post-Phase-9): Induction Age's own Silent Gear material
    # tier (see scripts/gen_gear_materials.py). Since `enforcement.
    # block_crafting_with_locked_ingredients` is on, locking just the raw
    # ingot is enough to gate every Silent Gear part/tool/weapon/armor piece
    # crafted from it - no need to separately lock each derived item.
    "id:allthemodium:allthemodium_ingot",

    # Travel overhaul Part 2 (revised): Create Aeronautics' top tier - once
    # more no explicit lock, since aeronautics:steam_vent is patched via
    # KubeJS (travel.js) to require allthemodium:allthemodium_ingot (locked
    # above), reusing this tier's own established material rather than a
    # new explicit item lock. Steam Vent is the mod's passive/industrial
    # heat source (vs. the Brass Age Adjustable Burner's manual redstone-
    # toggled one), sized for the big sustained-lift envelope clusters that
    # make sense as the ceiling right before the Tier 5 space gateway.

    # Travel overhaul Part 3: Waystones - teleportation, explicitly gated
    # late per the user's request, placed at this tier's automation ceiling
    # just before the Tier 5 space gateway. Every Waystones recipe uses
    # only vanilla materials (ender pearl, amethyst shard, emerald,
    # obsidian, stone bricks) with nothing naturally tier-locked in this
    # pack, so this is entirely explicit locking. warp_stone is itself an
    # ingredient in the waystone block's own recipe, so locking it alone
    # already blocks crafting a waystone transitively - both are still
    # listed explicitly, matching this pack's established double-locking
    # convention.
    "id:waystones:warp_stone",
    "id:waystones:waystone",
    "id:waystones:mossy_waystone",
    "id:waystones:sandy_waystone",
    "id:waystones:blackstone_waystone",
    "id:waystones:deepslate_waystone",
    "id:waystones:end_stone_waystone",
    "id:waystones:warp_scroll",
    "id:waystones:return_scroll",
    "id:waystones:portal_scroll",
]
always_unlocked = []

[blocks]
locked = [
    "id:refinedstorage:autocrafter",
    "id:refinedstorage:autocrafter_manager",
    "id:refinedstorage:autocrafting_monitor",
    "id:refinedstorage:pattern_grid",
    "id:refinedstorage:64k_storage_block",
    "id:refinedstorage:4096b_fluid_storage_block",
]
always_unlocked = []

[dimensions]
locked = []

[enforcement]
block_crafting_with_locked_ingredients = true
block_automated_crafting = true
crafter_check_radius = 32
