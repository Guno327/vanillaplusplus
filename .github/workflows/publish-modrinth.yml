name: Publish to Modrinth

# Pushes the client .mrpack AND the server .zip from a GitHub Release to
# Modrinth, as two files on the same version.
#
# RESUMED (#28, 2026-07-20): was paused because FTB Library/Teams/Quests/
# Chunks were CurseForge-only mods we had no redistribution permission for,
# and Modrinth's upload API rejects any non-cdn.modrinth.com download host
# outright - excluding them left quests/teams/chunk-claims non-functional,
# which wasn't an acceptable Modrinth listing either. Resolved by removing
# the entire FTB suite from the pack (#32: FTB Teams/Chunks -> Open Parties
# and Claims; #33: FTB Quests -> a bespoke KubeJS quest tracker; FTB
# Library dropped once those were its only remaining consumers) - nothing
# in the pack is redistribution-restricted anymore.
#
# SERVER BUNDLE ADDED (#28, same day): the NixOS module
# (nix/module.nix) now defaults to fetching the dedicated-server bundle
# from Modrinth's own CDN (a stable, public, unauthenticated URL) instead
# of requiring a manually downloaded GitHub release asset - see
# scripts/update_nix_release.py, which reads the file back from Modrinth's
# API after this workflow runs. `files:` below lists the .mrpack first so
# it stays the version's primary/default-download file (mc-publish has no
# explicit primary-file control beyond match order); the server .zip is
# just a second file attached to the same version, not a separate
# modpack/project entry.
#
# Requires two things only the owner can provide (tracked on #28):
#   - vars.MODRINTH_PROJECT_ID  — the Modrinth project's slug/ID (not
#     secret; a GitHub Actions repo *variable*)
#   - secrets.MODRINTH_TOKEN    — a Modrinth PAT with version-write scope

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re-)publish, e.g. v0.1.1. Defaults to the latest release."
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$tag" ]; then
            tag="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName -q '.[0].tagName')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          prerelease="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isPrerelease -q .isPrerelease)"
          if [ "$prerelease" = "true" ]; then
            echo "version_type=beta" >> "$GITHUB_OUTPUT"
          else
            echo "version_type=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Download the release's .mrpack + server .zip + changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ steps.release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --pattern '*.mrpack' --dir dist
          gh release download "${{ steps.release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --pattern '*.zip' --dir dist
          gh release view "${{ steps.release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --json body -q .body > dist/CHANGELOG.md

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: |
            dist/*.mrpack
            dist/*.zip
          name: Vanilla++ ${{ steps.release.outputs.tag }}
          version: ${{ steps.release.outputs.version }}
          version-type: ${{ steps.release.outputs.version_type }}
          loaders: neoforge
          game-versions: 1.21.1
          changelog-file: dist/CHANGELOG.md
