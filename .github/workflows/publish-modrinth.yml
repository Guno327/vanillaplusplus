name: Publish to Modrinth

# Pushes the client .mrpack from a GitHub Release to Modrinth.
#
# PAUSED (#28, 2026-07-20): the automatic `release: published` trigger is
# disabled below. FTB Library/Teams/Quests/Chunks are CurseForge-only and
# we do not have permission to redistribute them; they can only be
# excluded from a Modrinth version, not embedded or referenced by their
# original URL (Modrinth's upload API rejects non-cdn.modrinth.com download
# hosts outright). Excluding them leaves quests/teams/chunk-claims
# non-functional, which isn't an acceptable Modrinth listing either, so
# publishing stays paused until that's resolved (permission from the FTB
# team, or those mods dropped/replaced in the pack). Re-enable the
# `release:` trigger below once that's settled; workflow_dispatch still
# works for a manual, deliberate run in the meantime.
#
# Requires two things only the owner can provide (tracked on #28):
#   - vars.MODRINTH_PROJECT_ID  — the Modrinth project's slug/ID (not
#     secret; a GitHub Actions repo *variable*)
#   - secrets.MODRINTH_TOKEN    — a Modrinth PAT with version-write scope

on:
  # release:
  #   types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re-)publish, e.g. v0.1.1. Defaults to the latest release."
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$tag" ]; then
            tag="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName -q '.[0].tagName')"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          prerelease="$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json isPrerelease -q .isPrerelease)"
          if [ "$prerelease" = "true" ]; then
            echo "version_type=beta" >> "$GITHUB_OUTPUT"
          else
            echo "version_type=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Download the release's .mrpack + changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ steps.release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --pattern '*.mrpack' --dir dist
          gh release view "${{ steps.release.outputs.tag }}" --repo "$GITHUB_REPOSITORY" --json body -q .body > dist/CHANGELOG.md

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: dist/*.mrpack
          name: Vanilla++ ${{ steps.release.outputs.tag }}
          version: ${{ steps.release.outputs.version }}
          version-type: ${{ steps.release.outputs.version_type }}
          loaders: neoforge
          game-versions: 1.21.1
          changelog-file: dist/CHANGELOG.md
