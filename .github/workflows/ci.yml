name: CI (fast)

# Fast-tier CI (GitHub issue #12): pure-static validators over pack/ data
# plus their unit tests. Python 3.11+ stdlib-only, no pip installs, no
# network access, no server boot - this is the tier that runs on every PR
# and every push to main.
#
# ISSUE #27 UPDATE (2026-07-20, "Async Way to Mint Release"): added
# `workflow_call` so mint-release.yml can run this exact tier as a
# reusable workflow (`jobs.<id>.uses: ./.github/workflows/ci.yml`)
# instead of re-declaring its two run steps a second time. Also added a
# bare `workflow_dispatch` so mint-release.yml's own automated
# post-release PR (which opens with the default GITHUB_TOKEN and
# therefore does NOT auto-trigger this file's own `pull_request` trigger
# - a known GitHub Actions limitation, see mint-release.yml's header) can
# explicitly kick this tier off against that PR's branch as its
# mitigation, via `gh workflow run ci.yml --ref <branch>`. Neither
# addition changes this workflow's own PR/push behavior at all.

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast-checks:
    name: Fast-tier static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests (scripts/ci/tests)
        run: python3 -m unittest discover -s scripts/ci/tests -v

      - name: Run all fast-tier checks (scripts/ci/run_all.py)
        run: python3 scripts/ci/run_all.py
