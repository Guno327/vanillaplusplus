<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <!--
    Original banner artwork for the Vanilla++ Modrinth page.
    Authored from scratch for this repo: plain shapes + system fonts only.
    No imported artwork, mod logos, or third-party iconography.
    Licensing: original work, free for the repo owner to use/modify/redistribute.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b2016"/>
      <stop offset="55%" stop-color="#4a3524"/>
      <stop offset="100%" stop-color="#6b4a2e"/>
    </linearGradient>
    <linearGradient id="cogGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0a458"/>
      <stop offset="100%" stop-color="#b97a33"/>
    </linearGradient>
    <linearGradient id="stair" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fae5c"/>
      <stop offset="100%" stop-color="#c9d97a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="300" fill="url(#bg)"/>

  <!-- tier-ladder motif: ascending steps, bottom-left to mid-right -->
  <g opacity="0.55">
    <rect x="40"  y="240" width="90" height="30" fill="url(#stair)"/>
    <rect x="130" y="210" width="90" height="60" fill="url(#stair)"/>
    <rect x="220" y="180" width="90" height="90" fill="url(#stair)"/>
    <rect x="310" y="150" width="90" height="120" fill="url(#stair)"/>
    <rect x="400" y="120" width="90" height="150" fill="url(#stair)"/>
  </g>

  <!-- generic mechanical cog motif (simple geometric gear, not any mod's brand) -->
  <g transform="translate(1020,150)" fill="url(#cogGrad)" opacity="0.9">
    <g id="cogTeeth">
      <rect x="-14" y="-95" width="28" height="30"/>
      <rect x="-14" y="65" width="28" height="30"/>
      <rect x="-95" y="-14" width="30" height="28"/>
      <rect x="65" y="-14" width="30" height="28"/>
    </g>
    <g transform="rotate(45)">
      <rect x="-14" y="-95" width="28" height="30"/>
      <rect x="-14" y="65" width="28" height="30"/>
      <rect x="-95" y="-14" width="30" height="28"/>
      <rect x="65" y="-14" width="30" height="28"/>
    </g>
    <circle r="72" fill="url(#cogGrad)"/>
    <circle r="30" fill="#2b2016"/>
  </g>
  <g transform="translate(900,225) rotate(20)" fill="url(#cogGrad)" opacity="0.75">
    <g>
      <rect x="-9" y="-55" width="18" height="18"/>
      <rect x="-9" y="37" width="18" height="18"/>
      <rect x="-55" y="-9" width="18" height="18"/>
      <rect x="37" y="-9" width="18" height="18"/>
    </g>
    <g transform="rotate(45)">
      <rect x="-9" y="-55" width="18" height="18"/>
      <rect x="-9" y="37" width="18" height="18"/>
      <rect x="-55" y="-9" width="18" height="18"/>
      <rect x="37" y="-9" width="18" height="18"/>
    </g>
    <circle r="42" fill="url(#cogGrad)"/>
    <circle r="18" fill="#2b2016"/>
  </g>

  <!-- wordmark -->
  <text x="60" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-weight="700" fill="#f5ead3" stroke="#2b2016" stroke-width="2">
    VANILLA++
  </text>
  <text x="64" y="165" font-family="Verdana, Arial, sans-serif" font-size="26"
        fill="#e9d9b6" letter-spacing="1.5">
    A CREATE-DRIVEN PROGRESSION OVERHAUL &#8226; MC 1.21.1 / NEOFORGE
  </text>
</svg>
