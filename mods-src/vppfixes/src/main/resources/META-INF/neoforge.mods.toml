modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/Guno327/vanillaplusplus/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

# Ars Nouveau is the mod whose ars_nouveau:spell_resolver serializer this mod guards
# (GitHub #143). Declared OPTIONAL + ordering AFTER only so that, when present, Ars has
# registered its serializer before ours runs; the mixin targets vanilla SynchedEntityData
# and keys off a string id, so this mod loads and does nothing harmful if Ars is absent.
[[dependencies.${mod_id}]]
    modId = "ars_nouveau"
    type = "optional"
    versionRange = "*"
    ordering = "AFTER"
    side = "BOTH"

[[mixins]]
config = "vppfixes.mixins.json"
